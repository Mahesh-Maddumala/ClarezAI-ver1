<svg viewBox="0 0 320 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="KOL intelligence network">
  <defs>
    <linearGradient id="kBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF6FE"/><stop offset="1" stop-color="#E2ECFA"/>
    </linearGradient>
    <linearGradient id="kMain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38B6E6"/><stop offset="1" stop-color="#0B3E8C"/>
    </linearGradient>
    <linearGradient id="kNode" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5FD3F2"/><stop offset="1" stop-color="#0E5BC4"/>
    </linearGradient>
    <filter id="kS" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#0B3E8C" flood-opacity=".26"/>
    </filter>
  </defs>
  <rect width="320" height="240" rx="18" fill="url(#kBg)"/>
  <!-- links -->
  <g stroke="#0E5BC4" stroke-opacity=".30" stroke-width="3" stroke-linecap="round">
    <line x1="160" y1="120" x2="70" y2="60"/>
    <line x1="160" y1="120" x2="258" y2="64"/>
    <line x1="160" y1="120" x2="64" y2="178"/>
    <line x1="160" y1="120" x2="256" y2="176"/>
  </g>
  <!-- satellite nodes -->
  <g>
    <g filter="url(#kS)"><circle cx="70" cy="60" r="26" fill="url(#kNode)"/></g>
    <circle cx="70" cy="53" r="8" fill="#fff" opacity=".92"/>
    <path d="M55 76 a15 13 0 0 1 30 0 Z" fill="#fff" opacity=".92"/>
  </g>
  <g>
    <g filter="url(#kS)"><circle cx="258" cy="64" r="24" fill="url(#kNode)"/></g>
    <circle cx="258" cy="58" r="7.5" fill="#fff" opacity=".92"/>
    <path d="M244 80 a14 12 0 0 1 28 0 Z" fill="#fff" opacity=".92"/>
  </g>
  <g>
    <g filter="url(#kS)"><circle cx="64" cy="178" r="22" fill="url(#kNode)"/></g>
    <circle cx="64" cy="173" r="7" fill="#fff" opacity=".92"/>
    <path d="M51 193 a13 11 0 0 1 26 0 Z" fill="#fff" opacity=".92"/>
  </g>
  <g>
    <g filter="url(#kS)"><circle cx="256" cy="176" r="22" fill="url(#kNode)"/></g>
    <circle cx="256" cy="171" r="7" fill="#fff" opacity=".92"/>
    <path d="M243 191 a13 11 0 0 1 26 0 Z" fill="#fff" opacity=".92"/>
  </g>
  <!-- central expert -->
  <g filter="url(#kS)"><circle cx="160" cy="118" r="46" fill="url(#kMain)"/></g>
  <ellipse cx="146" cy="100" rx="20" ry="14" fill="#fff" opacity=".18"/>
  <circle cx="160" cy="106" r="15" fill="#fff"/>
  <path d="M133 150 a27 23 0 0 1 54 0 Z" fill="#fff"/>
</svg>
