<svg viewBox="0 0 320 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Insight analytics hub">
  <defs>
    <linearGradient id="iBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF6FE"/><stop offset="1" stop-color="#E2ECFA"/>
    </linearGradient>
    <linearGradient id="iPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#EAF3FC"/>
    </linearGradient>
    <linearGradient id="iBar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#0E5BC4"/><stop offset="1" stop-color="#46C8EE"/>
    </linearGradient>
    <linearGradient id="iDonut" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#28BEEC"/><stop offset="1" stop-color="#0B3E8C"/>
    </linearGradient>
    <filter id="iS" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0B3E8C" flood-opacity=".22"/>
    </filter>
  </defs>
  <rect width="320" height="240" rx="18" fill="url(#iBg)"/>
  <!-- dashboard panel -->
  <g filter="url(#iS)">
    <rect x="46" y="44" width="228" height="152" rx="16" fill="url(#iPanel)"/>
  </g>
  <rect x="46" y="44" width="228" height="34" rx="16" fill="#0E5BC4" opacity=".10"/>
  <circle cx="66" cy="61" r="4.5" fill="#28BEEC"/>
  <rect x="80" y="57" width="70" height="8" rx="4" fill="#0E5BC4" opacity=".30"/>
  <!-- bars -->
  <g>
    <rect x="70" y="150" width="20" height="28" rx="5" fill="url(#iBar)"/>
    <rect x="98" y="132" width="20" height="46" rx="5" fill="url(#iBar)"/>
    <rect x="126" y="116" width="20" height="62" rx="5" fill="url(#iBar)"/>
  </g>
  <!-- line + points -->
  <polyline points="70,140 100,124 128,112 160,96 196,104" fill="none" stroke="#28BEEC" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="160" cy="96" r="5.5" fill="#fff" stroke="#0E5BC4" stroke-width="3"/>
  <!-- donut -->
  <g filter="url(#iS)"><circle cx="226" cy="138" r="30" fill="#fff"/></g>
  <circle cx="226" cy="138" r="24" fill="none" stroke="#E2ECFA" stroke-width="11"/>
  <circle cx="226" cy="138" r="24" fill="none" stroke="url(#iDonut)" stroke-width="11"
          stroke-dasharray="105 151" stroke-linecap="round" transform="rotate(-90 226 138)"/>
</svg>
