<svg viewBox="0 0 320 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Retina scan intelligence">
  <defs>
    <linearGradient id="rBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF6FE"/><stop offset="1" stop-color="#E2ECFA"/>
    </linearGradient>
    <linearGradient id="rPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E5BC4"/><stop offset="1" stop-color="#0A2D63"/>
    </linearGradient>
    <linearGradient id="rWave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7FE0F8"/><stop offset="1" stop-color="#28BEEC"/>
    </linearGradient>
    <radialGradient id="rGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7FE0F8" stop-opacity=".45"/><stop offset="1" stop-color="#7FE0F8" stop-opacity="0"/>
    </radialGradient>
    <filter id="rS" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0B3E8C" flood-opacity=".26"/>
    </filter>
    <clipPath id="rClip"><rect x="62" y="58" width="196" height="124" rx="16"/></clipPath>
  </defs>

  <rect width="320" height="240" rx="18" fill="url(#rBg)"/>
  <circle cx="160" cy="120" r="92" fill="url(#rGlow)"/>

  <!-- scan viewport (dark medical screen) -->
  <g filter="url(#rS)">
    <rect x="62" y="58" width="196" height="124" rx="16" fill="url(#rPanel)"/>
  </g>

  <g clip-path="url(#rClip)">
    <!-- faint grid -->
    <g stroke="#9FD6F2" stroke-opacity=".14" stroke-width="1">
      <line x1="62" y1="86" x2="258" y2="86"/>
      <line x1="62" y1="114" x2="258" y2="114"/>
      <line x1="62" y1="142" x2="258" y2="142"/>
      <line x1="110" y1="58" x2="110" y2="182"/>
      <line x1="160" y1="58" x2="160" y2="182"/>
      <line x1="210" y1="58" x2="210" y2="182"/>
    </g>

    <!-- OCT retinal layers: stacked waveforms with the characteristic foveal dip -->
    <g fill="none" stroke-linecap="round">
      <path d="M62 96 C 110 92 138 92 160 104 C 182 92 210 92 258 96"
            stroke="#5FD3F2" stroke-opacity=".55" stroke-width="3"/>
      <path d="M62 112 C 110 108 138 108 160 122 C 182 108 210 108 258 112"
            stroke="url(#rWave)" stroke-width="5"/>
      <path d="M62 130 C 110 127 138 127 160 138 C 182 127 210 127 258 130"
            stroke="#9FE7FA" stroke-opacity=".5" stroke-width="2.5"/>
      <path d="M62 148 C 112 146 138 146 160 152 C 182 146 208 146 258 148"
            stroke="#7FE0F8" stroke-opacity=".35" stroke-width="2"/>
    </g>

    <!-- vertical scan beam -->
    <rect x="205" y="58" width="2.5" height="124" fill="#BFF1FF" opacity=".8"/>
    <rect x="205" y="58" width="26" height="124" fill="#7FE0F8" opacity=".10"/>

    <!-- focal point on the central layer -->
    <circle cx="160" cy="122" r="5.5" fill="#ffffff"/>
    <circle cx="160" cy="122" r="11" fill="none" stroke="#BFF1FF" stroke-width="1.6" opacity=".8"/>
  </g>

  <!-- corner scan reticle -->
  <g stroke="#0E5BC4" stroke-opacity=".55" stroke-width="2.6" stroke-linecap="round" fill="none">
    <path d="M86 50 h-14 a4 4 0 0 0 -4 4 v10"/>
    <path d="M234 50 h14 a4 4 0 0 1 4 4 v10"/>
    <path d="M86 190 h-14 a4 4 0 0 1 -4 -4 v-10"/>
    <path d="M234 190 h14 a4 4 0 0 0 4 -4 v-10"/>
  </g>

  <!-- data ticks -->
  <circle cx="284" cy="80" r="3.5" fill="#28BEEC"/>
  <circle cx="40" cy="150" r="3" fill="#0E5BC4" opacity=".7"/>
  <circle cx="282" cy="168" r="2.6" fill="#28BEEC" opacity=".8"/>
</svg>
